<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#f4f7fb" />
  <title>立體圖形建構室｜頂點與稜</title>
  <style>
    :root{--bg:#eef3f9;--panel:#fff;--ink:#172033;--muted:#667085;--primary:#2563eb;--primary2:#1d4ed8;--danger:#dc2626;--line:#dbe3ee;--soft:#f7f9fc}
    *{box-sizing:border-box}html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang HK","Noto Sans TC",Arial,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}button,select{font:inherit}.app{height:100%;display:grid;grid-template-columns:320px 1fr}.sidebar{background:var(--panel);border-right:1px solid var(--line);padding:18px;overflow:auto;z-index:5}h1{font-size:22px;margin:0 0 5px}.subtitle{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.45}.section{padding:14px 0;border-top:1px solid var(--line)}.section:first-of-type{border-top:none;padding-top:0}.section-title{font-size:14px;font-weight:800;margin-bottom:10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}button,select{width:100%;min-height:42px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:9px 10px;font-weight:700;cursor:pointer}button:hover{border-color:#9fb5d3;background:#f8fbff}button.primary{background:var(--primary);border-color:var(--primary);color:#fff}button.primary:hover{background:var(--primary2)}button.danger{color:var(--danger)}button.active{background:#dbeafe;border-color:#60a5fa;color:#1d4ed8}.status{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:11px;font-size:13px;line-height:1.5}.count-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}.count{background:#fff;border:1px solid var(--line);border-radius:10px;text-align:center;padding:9px}.count b{font-size:22px;display:block}.hint{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}.viewer{position:relative;min-width:0}#canvasWrap{position:absolute;inset:0}#canvasWrap canvas{display:block;width:100%;height:100%;touch-action:none}.topbar{position:absolute;top:12px;left:12px;right:12px;display:flex;gap:8px;justify-content:space-between;pointer-events:none}.badge{pointer-events:auto;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--line);box-shadow:0 6px 24px rgba(30,41,59,.08);border-radius:999px;padding:9px 13px;font-size:13px;font-weight:800}.toast{position:absolute;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#172033;color:#fff;border-radius:10px;padding:10px 14px;opacity:0;transition:.2s;pointer-events:none;font-size:13px;z-index:8}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.mobile-toggle{display:none}.selected-list{font-size:12px;color:var(--muted);margin-top:8px;min-height:18px}@media(max-width:820px){.app{grid-template-columns:1fr}.sidebar{position:absolute;left:0;top:0;bottom:0;width:min(88vw,340px);transform:translateX(-102%);transition:.25s;box-shadow:10px 0 30px rgba(15,23,42,.16)}.sidebar.open{transform:translateX(0)}.mobile-toggle{display:block;position:absolute;right:12px;bottom:14px;z-index:10;width:auto;padding:11px 15px;background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 8px 25px rgba(37,99,235,.3)}.topbar{right:74px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <h1>立體圖形建構室</h1>
    <div class="subtitle">用「頂點」和「稜」自由組成立體圖形。支援電腦、iPad 及手機。</div>
    <div class="section"><div class="section-title">1. 選擇操作模式</div><div class="grid2"><button id="modeOrbit" class="active">旋轉觀察</button><button id="modeMove">移動頂點</button><button id="modeEdge">連接稜</button><button id="modeDelete">刪除物件</button></div><div class="hint" id="modeHint">拖動畫面旋轉；雙指或滑鼠滾輪縮放。</div></div>
    <div class="section"><div class="section-title">2. 建立與修改</div><div class="grid2"><button id="addVertex" class="primary">＋ 新增頂點</button><button id="addEdge">＋ 連接稜</button><button id="removeLastVertex" class="danger">－ 最後頂點</button><button id="removeLastEdge" class="danger">－ 最後一條稜</button></div><button id="clearAll" class="danger" style="margin-top:8px">清除全部</button><div class="selected-list" id="selectedInfo">尚未選取頂點</div></div>
    <div class="section"><div class="section-title">3. 預設立體圖形</div><select id="preset"><option value="">選擇圖形……</option><option value="cube">正方體</option><option value="cuboid">長方體</option><option value="tetra">四面體／三角錐</option><option value="squarePyramid">四角錐</option><option value="triPrism">三角柱</option><option value="octa">八面體</option></select><button id="loadPreset" style="margin-top:8px">載入預設圖形</button></div>
    <div class="section"><div class="section-title">模型資料</div><div class="status"><div class="count-row"><div class="count"><b id="vertexCount">0</b>頂點</div><div class="count"><b id="edgeCount">0</b>稜</div></div><div id="shapeMessage" style="margin-top:9px">建立你的第一個立體圖形吧！</div></div></div>
    <div class="section"><div class="section-title">顯示設定</div><div class="grid2"><button id="toggleLabels" class="active">顯示編號</button><button id="toggleGrid" class="active">顯示網格</button><button id="resetView">重設視角</button><button id="centerModel">模型置中</button></div></div>
    <div class="section"><div class="hint">教學建議：先載入正方體，請學生逐一刪除稜或頂點，再嘗試重建；亦可比較不同立體圖形的頂點和稜數量。</div></div>
  </aside>
  <main class="viewer"><div id="canvasWrap"></div><div class="topbar"><div class="badge" id="modeBadge">模式：旋轉觀察</div><div class="badge">拖動旋轉・點選頂點・自由建構</div></div><div class="toast" id="toast"></div><button class="mobile-toggle" id="mobileToggle">工具</button></main>
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';
import { TransformControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/TransformControls.js';
const wrap=document.getElementById('canvasWrap'),scene=new THREE.Scene();scene.background=new THREE.Color(0xeef3f9);const camera=new THREE.PerspectiveCamera(45,1,.1,1000);camera.position.set(7,6,8);const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;wrap.appendChild(renderer.domElement);scene.add(new THREE.HemisphereLight(0xffffff,0x64748b,2));const sun=new THREE.DirectionalLight(0xffffff,2.2);sun.position.set(6,10,7);sun.castShadow=true;scene.add(sun);const grid=new THREE.GridHelper(20,20,0x8fa6c2,0xcbd5e1);grid.position.y=-2.5;scene.add(grid);const orbit=new OrbitControls(camera,renderer.domElement);orbit.enableDamping=true;orbit.dampingFactor=.08;const transform=new TransformControls(camera,renderer.domElement);transform.setMode('translate');transform.setSize(.75);transform.addEventListener('dragging-changed',e=>orbit.enabled=!e.value);transform.addEventListener('objectChange',()=>{updateEdges();updateLabels()});scene.add(transform);const raycaster=new THREE.Raycaster(),pointer=new THREE.Vector2(),vertices=[],edges=[],labels=[];let mode='orbit',selected=[],labelsVisible=true;const vertexGeo=new THREE.SphereGeometry(.18,24,16),vertexMat=new THREE.MeshStandardMaterial({color:0x2563eb,roughness:.35}),selectedMat=new THREE.MeshStandardMaterial({color:0xf59e0b}),edgeMat=new THREE.MeshStandardMaterial({color:0x172033});
function makeLabel(text){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');x.fillStyle='rgba(255,255,255,.95)';x.beginPath();x.arc(64,64,33,0,Math.PI*2);x.fill();x.strokeStyle='#2563eb';x.lineWidth=5;x.stroke();x.fillStyle='#172033';x.font='bold 42px sans-serif';x.textAlign='center';x.textBaseline='middle';x.fillText(text,64,66);const t=new THREE.CanvasTexture(c),s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false}));s.scale.set(.58,.58,.58);return s}
function addVertex(pos=new THREE.Vector3()){const m=new THREE.Mesh(vertexGeo,vertexMat.clone());m.position.copy(pos);m.userData={type:'vertex',id:vertices.length};scene.add(m);vertices.push(m);const l=makeLabel(String(vertices.length));scene.add(l);labels.push(l);updateLabels();updateUI();return m}
function edgeExists(a,b){return edges.some(e=>(e.a===a&&e.b===b)||(e.a===b&&e.b===a))}function addEdge(a,b){if(a===b||edgeExists(a,b))return false;const m=new THREE.Mesh(new THREE.CylinderGeometry(.055,.055,1,12),edgeMat.clone());m.userData={type:'edge',edgeIndex:edges.length};scene.add(m);edges.push({a,b,mesh:m});updateEdge(edges.at(-1));updateUI();return true}function updateEdge(e){const A=vertices[e.a].position,B=vertices[e.b].position;e.mesh.position.copy(A.clone().add(B).multiplyScalar(.5));e.mesh.scale.set(1,A.distanceTo(B),1);e.mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),B.clone().sub(A).normalize())}function updateEdges(){edges.forEach(updateEdge)}function updateLabels(){labels.forEach((l,i)=>{if(vertices[i])l.position.copy(vertices[i].position).add(new THREE.Vector3(0,.38,0));l.visible=labelsVisible})}
function clearSelection(){selected.forEach(i=>vertices[i]?.material.copy(vertexMat));selected=[];transform.detach();updateSelectedInfo()}function selectVertex(i){if(mode==='edge'){if(!selected.includes(i)){selected.push(i);vertices[i].material.copy(selectedMat)}if(selected.length===2){const ok=addEdge(selected[0],selected[1]);toast(ok?'已連接一條稜':'這兩個頂點已連接');clearSelection()}}else if(mode==='move'){clearSelection();selected=[i];vertices[i].material.copy(selectedMat);transform.attach(vertices[i]);updateSelectedInfo()}}
function removeEdgeAt(i){const e=edges[i];if(!e)return;scene.remove(e.mesh);edges.splice(i,1);edges.forEach((x,j)=>x.mesh.userData.edgeIndex=j);updateUI()}function rebuildLabels(){labels.forEach(l=>scene.remove(l));labels.length=0;vertices.forEach((v,i)=>{const l=makeLabel(String(i+1));scene.add(l);labels.push(l)});updateLabels()}function removeVertexAt(i){if(!vertices[i])return;transform.detach();for(let j=edges.length-1;j>=0;j--)if(edges[j].a===i||edges[j].b===i)removeEdgeAt(j);edges.forEach(e=>{if(e.a>i)e.a--;if(e.b>i)e.b--});scene.remove(vertices[i]);scene.remove(labels[i]);vertices.splice(i,1);labels.splice(i,1);vertices.forEach((v,j)=>v.userData.id=j);rebuildLabels();clearSelection();updateEdges();updateUI()}function clearAll(){transform.detach();edges.forEach(e=>scene.remove(e.mesh));vertices.forEach(v=>scene.remove(v));labels.forEach(l=>scene.remove(l));edges.length=vertices.length=labels.length=0;selected=[];updateUI()}
function addVertexSmart(){const i=vertices.length,r=2.1,a=i*2.399963;addVertex(new THREE.Vector3(Math.cos(a)*r,((i%3)-1)*.75,Math.sin(a)*r));toast(`已新增頂點 ${vertices.length}`)}function setMode(m){mode=m;clearSelection();const names={orbit:'旋轉觀察',move:'移動頂點',edge:'連接稜',delete:'刪除物件'};document.getElementById('modeBadge').textContent='模式：'+names[m];document.querySelectorAll('#modeOrbit,#modeMove,#modeEdge,#modeDelete').forEach(b=>b.classList.remove('active'));document.getElementById({orbit:'modeOrbit',move:'modeMove',edge:'modeEdge',delete:'modeDelete'}[m]).classList.add('active');orbit.enabled=m==='orbit';document.getElementById('modeHint').textContent={orbit:'拖動畫面旋轉；雙指或滑鼠滾輪縮放。',move:'點選一個頂點，再拖動彩色箭嘴。',edge:'依次點選兩個頂點，即可連接成一條稜。',delete:'點選頂點或稜即可刪除。'}[m]}
function onPointer(e){const r=renderer.domElement.getBoundingClientRect();pointer.x=(e.clientX-r.left)/r.width*2-1;pointer.y=-(e.clientY-r.top)/r.height*2+1;raycaster.setFromCamera(pointer,camera);const h=raycaster.intersectObjects([...vertices,...edges.map(e=>e.mesh)],false);if(!h.length)return;const o=h[0].object;if(o.userData.type==='vertex'){if(mode==='delete')removeVertexAt(o.userData.id);else if(mode==='edge'||mode==='move')selectVertex(o.userData.id)}else if(o.userData.type==='edge'&&mode==='delete')removeEdgeAt(o.userData.edgeIndex)}renderer.domElement.addEventListener('pointerdown',e=>{if(mode!=='orbit'&&!transform.dragging)onPointer(e)});
function updateSelectedInfo(){document.getElementById('selectedInfo').textContent=selected.length?'已選取頂點：'+selected.map(i=>i+1).join('、'):'尚未選取頂點'}function updateUI(){document.getElementById('vertexCount').textContent=vertices.length;document.getElementById('edgeCount').textContent=edges.length;document.getElementById('shapeMessage').textContent=vertices.length?`目前模型共有 ${vertices.length} 個頂點和 ${edges.length} 條稜。`:'建立你的第一個立體圖形吧！';updateSelectedInfo()}function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove('show'),1500)}function centerModel(){if(!vertices.length)return;const c=vertices.reduce((s,v)=>s.add(v.position),new THREE.Vector3()).multiplyScalar(1/vertices.length);vertices.forEach(v=>v.position.sub(c));updateEdges();updateLabels();orbit.target.set(0,0,0);toast('模型已置中')}
function loadPreset(name){clearAll();const P=[],E=[],p=(x,y,z)=>P.push([x,y,z]),e=(a,b)=>E.push([a,b]);if(name==='cube'||name==='cuboid'){const x=name==='cube'?1.6:2.3,y=1.5,z=name==='cube'?1.6:1.1;[[-x,-y,-z],[x,-y,-z],[x,y,-z],[-x,y,-z],[-x,-y,z],[x,-y,z],[x,y,z],[-x,y,z]].forEach(q=>p(...q));[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]].forEach(q=>e(...q))}else if(name==='tetra'){[[1.8,-1.2,1.2],[-1.8,-1.2,1.2],[0,-1.2,-1.9],[0,1.8,0]].forEach(q=>p(...q));[[0,1],[1,2],[2,0],[0,3],[1,3],[2,3]].forEach(q=>e(...q))}else if(name==='squarePyramid'){[[-1.8,-1.2,-1.8],[1.8,-1.2,-1.8],[1.8,-1.2,1.8],[-1.8,-1.2,1.8],[0,2,0]].forEach(q=>p(...q));[[0,1],[1,2],[2,3],[3,0],[0,4],[1,4],[2,4],[3,4]].forEach(q=>e(...q))}else if(name==='triPrism'){[[-1.8,-1.3,-1.4],[1.8,-1.3,-1.4],[0,1.7,-1.4],[-1.8,-1.3,1.4],[1.8,-1.3,1.4],[0,1.7,1.4]].forEach(q=>p(...q));[[0,1],[1,2],[2,0],[3,4],[4,5],[5,3],[0,3],[1,4],[2,5]].forEach(q=>e(...q))}else if(name==='octa'){[[2,0,0],[-2,0,0],[0,2,0],[0,-2,0],[0,0,2],[0,0,-2]].forEach(q=>p(...q));[[0,2],[0,3],[0,4],[0,5],[1,2],[1,3],[1,4],[1,5],[2,4],[4,3],[3,5],[5,2]].forEach(q=>e(...q))}P.forEach(q=>addVertex(new THREE.Vector3(...q)));E.forEach(q=>addEdge(...q));centerModel();setMode('orbit');toast('已載入預設圖形')}
document.getElementById('modeOrbit').onclick=()=>setMode('orbit');document.getElementById('modeMove').onclick=()=>setMode('move');document.getElementById('modeEdge').onclick=()=>setMode('edge');document.getElementById('modeDelete').onclick=()=>setMode('delete');document.getElementById('addVertex').onclick=addVertexSmart;document.getElementById('addEdge').onclick=()=>{setMode('edge');toast('請依次點選兩個頂點')};document.getElementById('removeLastVertex').onclick=()=>removeVertexAt(vertices.length-1);document.getElementById('removeLastEdge').onclick=()=>removeEdgeAt(edges.length-1);document.getElementById('clearAll').onclick=()=>{if(confirm('確定清除全部頂點和稜？'))clearAll()};document.getElementById('loadPreset').onclick=()=>{const v=document.getElementById('preset').value;if(v)loadPreset(v)};document.getElementById('toggleLabels').onclick=e=>{labelsVisible=!labelsVisible;e.currentTarget.classList.toggle('active',labelsVisible);updateLabels()};document.getElementById('toggleGrid').onclick=e=>{grid.visible=!grid.visible;e.currentTarget.classList.toggle('active',grid.visible)};document.getElementById('resetView').onclick=()=>{camera.position.set(7,6,8);orbit.target.set(0,0,0);orbit.update()};document.getElementById('centerModel').onclick=centerModel;document.getElementById('mobileToggle').onclick=()=>document.getElementById('sidebar').classList.toggle('open');function resize(){const w=wrap.clientWidth,h=wrap.clientHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix()}window.addEventListener('resize',resize);resize();(function animate(){requestAnimationFrame(animate);orbit.update();renderer.render(scene,camera)})();loadPreset('cube');
</script>
</body>
</html>
