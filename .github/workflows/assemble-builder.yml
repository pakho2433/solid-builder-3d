name: Assemble builder application

on:
  push:
    branches: [main]
    paths:
      - 'builder_src/**'
      - '.github/workflows/assemble-builder.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble application
        run: cat builder_src/part*.js > app.js

      - name: Validate JavaScript syntax
        run: node --check app.js

      - name: Commit assembled app
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app.js
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "Build improved pyramid assembly interaction"
            git push
          fi
